name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Post-sync patches (manifest)
        run: python3 scripts/post-sync.py

      - name: Copy icon resources
        run: |
          chmod +x scripts/copy-icons.sh
          bash scripts/copy-icons.sh


      - name: Set Android SDK versions
        run: |
          GRADLE_FILE="android/app/build.gradle"
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' $GRADLE_FILE
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $GRADLE_FILE
          sed -i 's/versionCode .*/versionCode 205/' $GRADLE_FILE
          sed -i 's/versionName .*/versionName "2.0.5"/' $GRADLE_FILE

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Test Game-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
